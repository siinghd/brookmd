name: bindings-build

# Builds and tests the first-party Swift + Kotlin uniffi bindings generated from
# `crates/brookmd-ffi`. The `ffi-test` job also closes a gap: the FFI crate's own
# `cargo test` / `clippy` run nowhere else today. `kotlin` and `swift` regenerate
# the committed bindings (drift check) and run the wire-golden smoke tests on the
# host — the JVM on ubuntu, the macOS slice on macos-14. Device targets are not
# validated here.
on:
  pull_request:
    paths:
      - "crates/brookmd-ffi/**"
      - "crates/brookmd-core/**"
      - "bindings/**"
      - ".github/workflows/bindings-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ffi-test:
    name: ffi (cargo test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: cargo test
        working-directory: crates/brookmd-ffi
        run: cargo test

      # `--features cli` also builds/lints the in-crate bindgen bins.
      - name: cargo clippy
        working-directory: crates/brookmd-ffi
        run: cargo clippy --all-targets --features cli -- -D warnings

  kotlin:
    name: kotlin (drift + JVM host test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Builds the host cdylib (libbrook_md_ffi.so) AND regenerates the Kotlin
      # bindings from the release staticlib.
      - name: Regenerate Kotlin bindings
        run: bash bindings/kotlin/scripts/generate.sh

      - name: Drift check (generated Kotlin matches committed)
        run: git diff --exit-code bindings/kotlin/brookmd/src/main/kotlin

      # Pin Gradle instead of trusting the runner image: the build files target
      # KGP 2.0.21 / AGP 8.5.2, which need Gradle >= 8.7 but predate Gradle 9.
      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      # JNA loads libbrook_md_ffi.so from jna.library.path; generate.sh built it here.
      - name: JVM host golden test
        run: >
          gradle -p bindings/kotlin/host-test test --no-daemon
          -Djna.library.path=${{ github.workspace }}/crates/brookmd-ffi/target/release

      # Best-effort AAR assembly: jniLibs are empty (device .so come from the RN
      # package's build-android.sh / release artifacts), so this validates the
      # library module configures and packages, not a device build. Non-fatal.
      - name: Assemble Android AAR (best-effort, jniLibs empty)
        continue-on-error: true
        run: gradle -p bindings/kotlin/brookmd assembleRelease --no-daemon

  swift:
    name: swift (drift + XCFramework + swift test)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Regenerate Swift bindings
        run: bash bindings/swift/scripts/generate.sh

      - name: Drift check (generated Swift matches committed)
        run: git diff --exit-code bindings/swift/Sources/BrookMd/brook_md_ffi.swift

      - name: Build XCFramework (iOS + iOS-sim + macOS slices)
        run: bash bindings/swift/scripts/build-xcframework.sh

      - name: swift test (macOS slice)
        run: swift test --package-path bindings/swift

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: brookmd-ffi-swift-xcframework
          path: bindings/swift/Frameworks/brook_md_ffi.xcframework
          if-no-files-found: error
