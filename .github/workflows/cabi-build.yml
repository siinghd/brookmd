name: cabi-build

# Builds and tests the brookmd C-ABI layer (crates/brookmd-cabi), consumed by the
# brook_md Flutter/Dart package via dart:ffi. The `test` job is the authoritative
# host check (cargo test + clippy, exactly as run locally); the `android` and
# `apple` jobs cross-compile the crate for device/desktop targets and upload the
# prebuilt binaries as artifacts. Device jobs run on hosted runners with an NDK /
# Xcode available — they are not validated on the dev box.
on:
  pull_request:
    paths:
      - "crates/brookmd-cabi/**"
      - "crates/brookmd-core/**"
      - ".github/workflows/cabi-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: test (cargo test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/brookmd-cabi

      - name: cargo test (wire goldens + symbol-drift tripwire)
        working-directory: crates/brookmd-cabi
        # A release build first so the cdylib exists and the symbol-drift test's
        # `nm -D` check runs against a real artifact rather than skipping.
        run: |
          cargo build --release
          cargo test

      - name: cargo clippy (deny warnings)
        working-directory: crates/brookmd-cabi
        run: cargo clippy --all-targets -- -D warnings

  android:
    name: android (.so per ABI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # Hosted ubuntu runners ship an Android NDK; point the build at the latest.
      # r28+ is preferred (16 KB page-size linker default); r27 also builds.
      - name: Resolve NDK
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}" >> "$GITHUB_ENV"

      - name: Build cdylib for all ABIs
        working-directory: crates/brookmd-cabi
        # cargo-ndk's -o stages each .so under <abi>/ (arm64-v8a, …) in an artifact
        # dir — NOT the RN package's jniLibs; this crate ships prebuilt binaries.
        run: |
          set -euo pipefail
          out="${{ github.workspace }}/artifacts/android"
          mkdir -p "$out"
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86_64 \
            -o "$out" \
            --platform 24 \
            -- build --release
          cp include/brook_md.h "$out/brook_md.h"
          ls -R "$out"

      - name: Upload android binaries
        uses: actions/upload-artifact@v4
        with:
          name: brookmd-cabi-android
          path: artifacts/android/**
          if-no-files-found: error

  apple:
    name: apple (XCFramework + macOS dylib)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Apple targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build iOS XCFramework + universal macOS dylib
        working-directory: crates/brookmd-cabi
        run: |
          set -euo pipefail
          out="${{ github.workspace }}/artifacts/apple"
          mkdir -p "$out"

          A="libbrook_md_cabi.a"       # staticlib slice → iOS (linked into the app)
          DYL="libbrook_md_cabi.dylib" # cdylib slice → macOS desktop

          DEVICE=aarch64-apple-ios
          SIM_ARM=aarch64-apple-ios-sim
          SIM_X86=x86_64-apple-ios
          MAC_ARM=aarch64-apple-darwin
          MAC_X86=x86_64-apple-darwin

          for t in "$DEVICE" "$SIM_ARM" "$SIM_X86" "$MAC_ARM" "$MAC_X86"; do
            cargo build --release --target "$t"
          done

          # Fat simulator static lib (arm64 + x86_64).
          sim_fat="$out/$A"
          lipo -create \
            "target/$SIM_ARM/release/$A" \
            "target/$SIM_X86/release/$A" \
            -output "$sim_fat"

          # XCFramework: device static slice + fat simulator slice, header bundled.
          rm -rf "$out/BrookMdCabi.xcframework"
          xcodebuild -create-xcframework \
            -library "target/$DEVICE/release/$A" -headers include \
            -library "$sim_fat" -headers include \
            -output "$out/BrookMdCabi.xcframework"
          rm -f "$sim_fat"

          # Universal macOS dylib for desktop Flutter.
          lipo -create \
            "target/$MAC_ARM/release/$DYL" \
            "target/$MAC_X86/release/$DYL" \
            -output "$out/$DYL"

          cp include/brook_md.h "$out/brook_md.h"
          ls -R "$out"

      - name: Upload apple binaries
        uses: actions/upload-artifact@v4
        with:
          name: brookmd-cabi-apple
          path: artifacts/apple/**
          if-no-files-found: error
