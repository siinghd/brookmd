name: rn-build

# Builds and tests the brookmd-react-native native layer. The `js` job is the
# authoritative host check (bun tests + typecheck, exactly as run locally); the
# `android` and `ios` jobs cross-compile the brookmd-ffi crate for device targets
# and upload the artifacts. Device jobs run on hosted runners with an NDK / Xcode
# available — they are not validated on the dev box.
on:
  pull_request:
    paths:
      - "crates/brookmd-ffi/**"
      - "crates/brookmd-core/**"
      - "packages/brookmd-react-native/**"
      - ".github/workflows/rn-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  js:
    name: js (bun tests + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked || curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # The host tests drive brookmd's real compiled WASM parser; build it first
      # (stable toolchain) so the streaming-parity suite runs rather than skips.
      - name: Build brookmd WASM
        run: bun run build:wasm:stable

      # The RN package imports brookmd via its package exports (brookmd/client,
      # brookmd/worker-core, brookmd/html-to-react, …), which resolve to dist/.
      # brookmd has no prepare hook, so build its dist explicitly or every import
      # resolves to a missing file on a clean runner.
      - name: Build brookmd dist
        working-directory: packages/brookmd
        run: node scripts/build.mjs

      - name: Test brookmd-react-native
        working-directory: packages/brookmd-react-native
        run: bun test

      - name: Typecheck brookmd-react-native (test config)
        working-directory: packages/brookmd-react-native
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.test.json

      - name: Typecheck brookmd-react-native (main config)
        working-directory: packages/brookmd-react-native
        run: ./node_modules/.bin/tsc --noEmit -p tsconfig.json

  android:
    name: android (.so per ABI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      # Hosted ubuntu runners ship an Android NDK; point the build at the latest.
      # r28+ is preferred (16 KB page-size linker default); r27 also builds.
      - name: Resolve NDK
        run: echo "ANDROID_NDK_HOME=${ANDROID_NDK_LATEST_HOME:-$ANDROID_NDK_HOME}" >> "$GITHUB_ENV"

      - name: Build device .so for all ABIs
        working-directory: packages/brookmd-react-native
        run: bash scripts/build-android.sh

      - name: Upload jniLibs
        uses: actions/upload-artifact@v4
        with:
          name: brookmd-ffi-android-jniLibs
          path: packages/brookmd-react-native/android/src/main/jniLibs/**/*.so
          if-no-files-found: error

  ios:
    name: ios (XCFramework)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + iOS targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Build XCFramework (device + simulator)
        working-directory: packages/brookmd-react-native
        run: bash scripts/build-ios.sh

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: brookmd-ffi-ios-xcframework
          path: packages/brookmd-react-native/ios/BrookMdFfi.xcframework
          if-no-files-found: error
