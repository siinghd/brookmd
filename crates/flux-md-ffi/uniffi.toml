# uniffi bindings configuration for flux-md-ffi.
#
# Discovered automatically in library mode (it sits next to this crate's
# Cargo.toml); the generate scripts also pass it via `--config` explicitly.
# Keep the package/module names in sync with the committed bindings under
# `bindings/kotlin` and `bindings/swift`.

[bindings.kotlin]
# The generated .kt lands under io/github/siinghd/fluxmd/ and the JVM host-test
# + Android library both import from this package.
package_name = "io.github.siinghd.fluxmd"
