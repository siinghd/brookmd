name: brook_md
description: >-
  EXPERIMENTAL Dart/Flutter bindings for the brookmd streaming markdown parser
  (hand-written dart:ffi over the brookmd-cabi C ABI / brookmd-core).
version: 0.1.0
# Demand-driven scaffold; not on pub.dev yet. Flip to a real homepage + remove
# publish_to when the native-asset story is validated on device.
publish_to: none

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  # dart:ffi helpers: malloc/free + Utf8 <-> Dart String. dart:ffi itself is in
  # the SDK; this is the only third-party dependency.
  ffi: ^2.1.0

dev_dependencies:
  lints: ^5.0.0
