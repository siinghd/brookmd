# Socket.dev configuration for brookmd
#
# Two CLASSES of Socket signal show up against brookmd. They are handled
# differently on purpose:
#
#   A. FIRST-PARTY, INHERENT signals (hasNativeCode / networkAccess /
#      filesystemAccess). These accurately describe brookmd itself: a Rust->WASM
#      parser that runs in a Web Worker, fetches a caller-supplied `src` URL, and
#      (on Node/SSR) reads its own co-located .wasm off disk. We KEEP these
#      ENABLED (`true`) and document them. Silencing an accurate first-party
#      signal would be dishonest; visibility + a written justification is the
#      correct posture.
#
#   B. UPSTREAM-FRAMEWORK-INTERNAL signals (usesEval / obfuscatedFile /
#      dynamicRequire / potentialVulnerability / gptSecurity). These do NOT
#      originate in brookmd. brookmd ships ZERO runtime dependencies (package.json
#      `dependencies` and `optionalDependencies` are both empty). The eval /
#      obfuscation / "potential vulnerability" alerts come from TRANSITIVE
#      internals of the OPTIONAL framework peers:
#        * seroval (transitive of solid-js): `(0,eval)(source)` in deserialize();
#          this is also the package Socket's human + AI review flag as a
#          "potential vulnerability".
#        * @vue/compiler-core (transitive of vue): Function-constructor codegen.
#        * @vue/compiler-sfc (transitive of vue): globalThis["fetch"].
#        * minified esm-bundler builds of those compilers -> "Obfuscated code".
#      react / vue / svelte / solid-js are declared `peerDependenciesMeta.optional`,
#      so a React-only (or DOM/element/no-framework) consumer NEVER installs vue or
#      solid-js and these packages never enter THEIR lockfile. The real fix is
#      architectural (optional peers) and is already in place. We additionally set
#      the BEHAVIORAL alert types (usesEval / obfuscatedFile / dynamicRequire) to
#      `false` so framework internals don't block brookmd's OWN monorepo CI, where
#      devDependencies install all four frameworks for cross-framework tests and
#      thus pull seroval + @vue/compiler-* in.
#
#      We deliberately do NOT globally mute the VULNERABILITY-CLASS alerts
#      (potentialVulnerability / gptSecurity): those catch CVE-class issues and AI
#      security findings across the WHOLE tree (including any future first-party
#      runtime dependency), and the "no first-party eval" argument does not cover
#      them. seroval's specific "potential vulnerability" flag is handled with a
#      PER-PACKAGE ignore instead (see below) — pinned to the exact offending
#      package+version, so it re-activates automatically if seroval changes and
#      leaves vulnerability detection on for everything else.
#
# HONESTY CAVEAT: socket.yml `issueRules` are GLOBAL per-alert-type toggles; they
# cannot scope to "only seroval" or "only @vue/*". Setting `usesEval:false`
# therefore also disables eval detection for brookmd's own first-party source.
# That is acceptable here ONLY because brookmd's source contains no `eval` and no
# `Function(...)` constructor — verified (returns nothing; excludes the
# wasm-bindgen glue, which also has none):
#   grep -rnE '\beval\s*\(|\bnew Function\b|\bFunction\s*\(' packages/brookmd/src \
#     --include='*.ts' --include='*.tsx'
# If brookmd ever adds first-party dynamic code, REMOVE these `false` toggles and
# use per-package ignores instead — the Socket dashboard "ignore for this package",
# or PR comments like `@SocketSecurity ignore seroval@1.5.4` /
# `@SocketSecurity ignore @vue/compiler-core@3.5.39` — which are the precise,
# non-blunt mechanism.
#
# Real-threat detection (malware / install scripts / shell / env-var / typosquat)
# stays ENABLED so genuine supply-chain signal is preserved.
#
# Schema reference: https://docs.socket.dev/docs/socket-yml
# Alert-type ids:   https://docs.socket.dev/docs/alert-types

version: 2

issueRules:
  # =========================================================================
  # A. FIRST-PARTY INHERENT SIGNALS — kept ENABLED (visible + documented)
  # =========================================================================

  # hasNativeCode
  #
  # brookmd ships a precompiled WebAssembly binary:
  #   packages/brookmd/dist/wasm/brook_md_core_bg.wasm  (~180 KB)
  # the Rust->WASM parser core. It is reproducibly buildable from
  # crates/brookmd-core/ via `bun run build:wasm`, loaded only via the co-located
  # wasm-bindgen glue (dist/wasm/brook_md_core.js) using
  # `new URL("brook_md_core_bg.wasm", import.meta.url)`, executed inside a sandboxed
  # Web Worker (browser) or worker_threads (Node), and never fetched from a remote
  # endpoint. A WASM-core parser cannot exist without a compiled binary; the alert
  # is accurate and the binary is first-party + auditable.
  # (NOTE: the correct issue id is `hasNativeCode`, not `nativeCode`.)
  hasNativeCode: true

  # networkAccess
  #
  # brookmd's OWN network I/O is exactly two caller-driven cases:
  #   1. <brook-markdown src="URL"> (element.ts) fetches the URL the application
  #      developer supplies and streams it; brookmd never chooses a URL.
  #   2. wasm-bindgen glue fetch() of the co-located .wasm on first load, which
  #      bundlers resolve to a LOCAL build asset at build time.
  # No telemetry, no analytics, no first-party remote endpoints.
  # (@vue/compiler-sfc's `globalThis["fetch"]` network signal — transitive of the
  # OPTIONAL vue peer — also rides under this type. It is the Vue template
  # compiler, not brookmd, and is absent from any consumer that does not install
  # vue. We keep this type ENABLED because brookmd's own networkAccess is real and
  # worth surfacing; the vue-compiler instance is documented as upstream.)
  networkAccess: true

  # filesystemAccess
  #
  # brookmd/server (server.tsx) reads the package's OWN .wasm off disk on Node via
  # `new URL("./wasm/brook_md_core_bg.wasm", import.meta.url)` + fs, because Node's
  # fetch() cannot load file:// URLs. Node-only branch; reads only the
  # package-internal asset, never a caller-supplied path. Standard wasm-bindgen
  # Node loading. Kept ENABLED + documented.
  filesystemAccess: true

  # =========================================================================
  # B. UPSTREAM-FRAMEWORK-INTERNAL SIGNALS — suppressed (NOT brookmd code)
  #    These fire ONLY on transitive deps of the OPTIONAL framework peers
  #    (seroval via solid-js; @vue/compiler-* via vue). brookmd itself has zero
  #    runtime deps and no first-party eval / Function / dynamic-require.
  # =========================================================================

  # usesEval — seroval `(0,eval)(source)` (solid-js serializer deserialize) and
  # @vue/compiler-core Function-constructor codegen (vue template compiler).
  # Neither is brookmd; brookmd's own source has no eval/Function (verified above).
  usesEval: false

  # obfuscatedFile — minified esm-bundler builds of the framework
  # compilers/serializers read as "obfuscated". brookmd ships readable, compiled,
  # non-minified ESM (dist/*.js) — these instances are upstream-framework only.
  obfuscatedFile: false

  # dynamicRequire — dynamic module resolution inside the framework
  # compiler/runtime internals (optional peers). Not present in brookmd source;
  # server.tsx's only dynamic import is a single literal `import("node:fs/promises")`.
  dynamicRequire: false

  # NOTE: potentialVulnerability and gptSecurity are intentionally NOT set here —
  # they stay ENABLED (see the REAL-THREAT block below). Socket's human + AI review
  # flagged seroval (the solid-js serializer) as a possible vulnerability for its
  # eval-based deserialize(); that is upstream, optional-peer-only code, but muting
  # the whole vulnerability/AI-review alert CLASS repo-wide would also hide future
  # first-party or new-dependency CVEs. Handle the seroval instance precisely with a
  # PER-PACKAGE ignore instead of a global toggle:
  #   • Socket dashboard: "Ignore for this package" on seroval, or
  #   • PR comment:  @SocketSecurity ignore seroval@1.5.4
  # (and, if desired, @SocketSecurity ignore @vue/compiler-core@3.5.39 /
  #  @SocketSecurity ignore @vue/compiler-sfc@3.5.39). These pin to the exact
  # package+version and auto-reactivate if the dependency changes.

  # =========================================================================
  # REAL-THREAT / VULNERABILITY DETECTION — left ENABLED. Listed explicitly so the
  # intent is on the record: genuine supply-chain threats and vulnerability/AI
  # findings are NOT suppressed (the seroval instance is handled per-package above).
  # =========================================================================
  potentialVulnerability: true
  gptSecurity: true
  malware: true
  installScripts: true
  shellAccess: true
  envVars: true
  didYouMean: true
